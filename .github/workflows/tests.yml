name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  workerd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run unit and Workerd tests
        run: bun run test:unit && bun run test:workerd

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps --only-shell chromium
      - name: Run browser integration tests
        run: bun run --cwd apps/web test:e2e
