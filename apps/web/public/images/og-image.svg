<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Gongyu — links worth returning to</title>
  <desc id="desc">A personal bookmark library with a warm interface and a stack of saved links.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf8f4"/>
      <stop offset="0.58" stop-color="#f8f2ec"/>
      <stop offset="1" stop-color="#efe7df"/>
    </linearGradient>
    <radialGradient id="blue-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#5eb9e5" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#5eb9e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rust-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#b65c3d" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#b65c3d" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#7d6c60" stroke-opacity="0.045"/>
    </pattern>
    <filter id="card-shadow" x="-20%" y="-20%" width="150%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#654c3e" flood-opacity="0.14"/>
    </filter>
    <filter id="row-shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#654c3e" flood-opacity="0.08"/>
    </filter>
    <clipPath id="library-clip">
      <rect x="672" y="56" width="456" height="518" rx="28"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="1030" cy="42" r="430" fill="url(#blue-glow)"/>
  <circle cx="380" cy="650" r="330" fill="url(#rust-glow)"/>

  <!-- Product mark -->
  <g transform="translate(72 62)" font-family="Inter, Arial, sans-serif">
    <image href="logo.png" x="-8" y="-4" width="72" height="72"/>
    <text x="74" y="30" fill="#302b27" font-size="25" font-weight="750" letter-spacing="-0.7">Gongyu</text>
    <text x="74" y="53" fill="#8a7d73" font-size="11" font-weight="700" letter-spacing="2.1">PERSONAL BOOKMARK LIBRARY</text>
  </g>

  <!-- Main message -->
  <g transform="translate(72 191)" font-family="Inter, Arial, sans-serif">
    <g>
      <rect width="204" height="38" rx="19" fill="#fffdfa" stroke="#ded3c9"/>
      <circle cx="22" cy="19" r="5" fill="#b65c3d"/>
      <circle cx="22" cy="19" r="10" fill="none" stroke="#b65c3d" stroke-opacity="0.22"/>
      <text x="40" y="24" fill="#655b54" font-size="12" font-weight="700" letter-spacing="1.45">SAVED FOR LATER</text>
    </g>

    <text x="0" y="111" fill="#302b27" font-size="63" font-weight="770" letter-spacing="-2.8">
      <tspan x="0">Links worth</tspan>
      <tspan x="0" dy="70">returning to.</tspan>
    </text>

    <text x="0" y="282" fill="#71675f" font-size="21" font-weight="430">
      <tspan x="0">A calm, searchable home for the pages,</tspan>
      <tspan x="0" dy="31">ideas, and references you want to keep.</tspan>
    </text>

  </g>

  <!-- Bookmark library card -->
  <g filter="url(#card-shadow)">
    <rect x="672" y="56" width="456" height="518" rx="28" fill="#fffdfa" stroke="#e5dcd4"/>
  </g>
  <g clip-path="url(#library-clip)" font-family="Inter, Arial, sans-serif">
    <rect x="672" y="56" width="456" height="518" fill="#fffdfa"/>
    <rect x="672" y="56" width="456" height="91" fill="#fbf6f1"/>
    <path d="M672 147h456" stroke="#e7ded6"/>

    <g transform="translate(702 85)">
      <image href="logo.png" x="-6" y="-7" width="58" height="58"/>
      <text x="58" y="18" fill="#3f3833" font-size="17" font-weight="750">Saved links</text>
      <text x="58" y="38" fill="#91857c" font-size="11" font-weight="550">Your personal corner of the web</text>
      <rect x="332" y="2" width="74" height="34" rx="17" fill="#b65c3d"/>
      <text x="369" y="23" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">+ Add</text>
    </g>

    <!-- Search -->
    <g transform="translate(702 166)">
      <rect width="396" height="42" rx="11" fill="#faf6f2" stroke="#dfd5cc"/>
      <circle cx="20" cy="20" r="6.5" fill="none" stroke="#8a7d73" stroke-width="1.7"/>
      <path d="m25 25 5 5" stroke="#8a7d73" stroke-width="1.7" stroke-linecap="round"/>
      <text x="42" y="26" fill="#9a8e85" font-size="13">Search bookmarks…</text>
    </g>

    <!-- Rows -->
    <g transform="translate(702 227)" filter="url(#row-shadow)">
      <rect width="396" height="92" rx="13" fill="#fff" stroke="#e4dbd3"/>
      <rect x="14" y="14" width="65" height="64" rx="10" fill="#ecf7f9"/>
      <path d="M28 57 45 38l12 12 9-10 12 17Z" fill="#78c9e8"/>
      <circle cx="61" cy="31" r="7" fill="#f4c77c"/>
      <text x="94" y="31" fill="#3c3530" font-size="15" font-weight="720">Designing calm interfaces</text>
      <text x="94" y="53" fill="#80746b" font-size="12">Thoughtful patterns for useful software.</text>
      <rect x="94" y="64" width="82" height="17" rx="8.5" fill="#f1ece7"/>
      <text x="135" y="76" text-anchor="middle" fill="#6c625b" font-size="8.5" font-weight="720" letter-spacing="0.7">DESIGN.SYSTEMS</text>
    </g>

    <g transform="translate(702 331)" filter="url(#row-shadow)">
      <rect width="396" height="92" rx="13" fill="#fff" stroke="#e4dbd3"/>
      <rect x="14" y="14" width="65" height="64" rx="10" fill="#f1effc"/>
      <path d="M27 61h39M27 48h28M27 35h36" stroke="#4b48c8" stroke-width="5" stroke-linecap="round"/>
      <text x="94" y="31" fill="#3c3530" font-size="15" font-weight="720">A guide to the open web</text>
      <text x="94" y="53" fill="#80746b" font-size="12">Standards, tools, and enduring ideas.</text>
      <rect x="94" y="64" width="59" height="17" rx="8.5" fill="#f1ece7"/>
      <text x="123.5" y="76" text-anchor="middle" fill="#6c625b" font-size="8.5" font-weight="720" letter-spacing="0.7">WEB.DEV</text>
    </g>

    <g transform="translate(702 435)" filter="url(#row-shadow)">
      <rect width="396" height="92" rx="13" fill="#fff" stroke="#e4dbd3"/>
      <rect x="14" y="14" width="65" height="64" rx="10" fill="#f8eee7"/>
      <circle cx="46.5" cy="46" r="21" fill="none" stroke="#c46b4b" stroke-width="5"/>
      <path d="M46.5 25v21l14 9" fill="none" stroke="#c46b4b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="94" y="31" fill="#3c3530" font-size="15" font-weight="720">Things to read this weekend</text>
      <text x="94" y="53" fill="#80746b" font-size="12">A small collection for unhurried time.</text>
      <rect x="94" y="64" width="67" height="17" rx="8.5" fill="#f1ece7"/>
      <text x="127.5" y="76" text-anchor="middle" fill="#6c625b" font-size="8.5" font-weight="720" letter-spacing="0.7">READING</text>
    </g>
  </g>

  <text x="1128" y="606" text-anchor="end" fill="#8d8178" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="650" letter-spacing="1.25">OPEN SOURCE · SELF-HOSTED</text>
</svg>
