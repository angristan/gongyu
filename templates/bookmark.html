{{define "content"}}
<div class="mb-2">
    <a href="/">&larr; All bookmarks</a>
</div>

<div class="card">
    {{if .Bookmark.ThumbnailUrl}}
        <img src="{{.Bookmark.ThumbnailUrl}}" alt="" style="max-width:100%;border-radius:var(--radius);margin-bottom:1rem" loading="lazy">
    {{end}}

    <h1 style="margin-bottom:0.5rem">{{.Bookmark.Title}}</h1>

    <div class="flex gap-1 mb-2" style="flex-wrap:wrap;align-items:center">
        <span class="badge">{{domain .Bookmark.Url}}</span>
        <span class="text-muted text-sm">{{formatDate .Bookmark.CreatedAt}}</span>
    </div>

    <p style="margin-bottom:1rem">
        <a href="{{.Bookmark.Url}}" target="_blank" rel="noopener">{{.Bookmark.Url}}</a>
    </p>

    {{if .Bookmark.Description}}
        <p>{{.Bookmark.Description}}</p>
    {{end}}

    {{if .User}}
        <div class="mt-3">
            <a href="/admin/bookmarks/{{.Bookmark.ID}}/edit" class="btn btn-secondary btn-sm">Edit</a>
        </div>
    {{end}}
</div>
{{end}}

{{template "layout" .}}
