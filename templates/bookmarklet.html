{{define "content"}}
<div class="card" style="max-width:500px;margin:0 auto">
    <h1>Add Bookmark</h1>

    {{if .Existing}}
        <div class="flash" style="background:#fffff0;border-color:#fefcbf;color:#975a16">
            This URL is already bookmarked: <a href="/b/{{.Existing.ShortUrl}}">{{.Existing.Title}}</a>
        </div>
    {{end}}

    <form method="POST" action="/admin/bookmarks" id="bookmarklet-form">
        <input type="hidden" name="source" value="{{.Source}}">

        <div class="form-group">
            <label for="url">URL</label>
            <input type="url" id="url" name="url" value="{{.PrefillURL}}" required>
        </div>

        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" value="{{.PrefillTitle}}" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description">{{.PrefillDesc}}</textarea>
        </div>

        {{if .HasSocial}}
        <div class="form-group checkbox-group">
            <input type="checkbox" id="share" name="share">
            <label for="share" style="margin-bottom:0">Share to social media</label>
        </div>
        {{end}}

        <button type="submit" class="btn btn-primary" style="width:100%">Save Bookmark</button>
    </form>
</div>
{{end}}

{{template "layout" .}}
